openapi: "3.0.0"
info:
  title: Pet Store
  version: "2.0.0"
paths:
  /pets:
    get:
      summary: List all pets
      deprecated: true
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: filter
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
        "429":
          description: Rate limit exceeded
    post:
      summary: Create a pet
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                breed:
                  type: integer
      responses:
        "201":
          description: created
  /pets/{id}:
    get:
      summary: Get a pet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
  /pets/{id}/notes:
    get:
      summary: List notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
